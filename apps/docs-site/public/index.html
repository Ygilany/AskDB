<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AskDB Docs</title>
    <meta
      name="description"
      content="Documentation for AskDB packages, CLI tools, schema artifacts, and HTTP API."
    />
    <link rel="stylesheet" href="./assets/styles.css" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("askdb-docs-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = stored === "light" || stored === "dark" ? stored : prefersDark ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (error) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#/">
        <span class="brand-mark">A</span>
        <span>
          <strong>AskDB</strong>
          <small>Documentation</small>
        </span>
      </a>
      <button class="icon-button nav-toggle" type="button" aria-label="Open navigation" data-nav-toggle>
        <span></span>
        <span></span>
        <span></span>
      </button>
      <label class="search" for="docs-search">
        <span aria-hidden="true">/</span>
        <input id="docs-search" type="search" placeholder="Search docs" autocomplete="off" />
      </label>
      <nav class="toplinks" aria-label="Top links">
        <a href="https://github.com/Ygilany/AskDB">GitHub</a>
        <a href="#/quickstart">Quickstart</a>
        <a href="#/packages">Packages</a>
      </nav>
      <button
        class="icon-button theme-toggle"
        type="button"
        data-theme-toggle
        aria-label="Switch to dark theme"
        title="Toggle theme"
      >
        <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <circle cx="12" cy="12" r="4" fill="currentColor" />
          <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="12" y1="2" x2="12" y2="5" />
            <line x1="12" y1="19" x2="12" y2="22" />
            <line x1="2" y1="12" x2="5" y2="12" />
            <line x1="19" y1="12" x2="22" y2="12" />
            <line x1="4.2" y1="4.2" x2="6.3" y2="6.3" />
            <line x1="17.7" y1="17.7" x2="19.8" y2="19.8" />
            <line x1="4.2" y1="19.8" x2="6.3" y2="17.7" />
            <line x1="17.7" y1="6.3" x2="19.8" y2="4.2" />
          </g>
        </svg>
        <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path
            d="M20.5 14.5A8 8 0 0 1 9.5 3.5a1 1 0 0 0-1.2-1.3 10 10 0 1 0 13.5 13.5 1 1 0 0 0-1.3-1.2z"
            fill="currentColor"
          />
        </svg>
      </button>
    </header>

    <div class="shell">
      <aside class="sidebar" data-sidebar>
        <div class="sidebar-section">
          <p>Start</p>
          <a href="#/" data-nav-link="/">Overview</a>
          <a href="#/quickstart" data-nav-link="/quickstart">Quickstart</a>
          <a href="#/concepts" data-nav-link="/concepts">Core concepts</a>
        </div>
        <div class="sidebar-section">
          <p>Packages</p>
          <a href="#/packages" data-nav-link="/packages">Package index</a>
          <a href="#/core" data-nav-link="/core">@askdb/core</a>
          <a href="#/postgres" data-nav-link="/postgres">@askdb/postgres</a>
          <a href="#/cli" data-nav-link="/cli">@askdb/cli</a>
          <a href="#/introspect" data-nav-link="/introspect">@askdb/introspect</a>
          <a href="#/tui" data-nav-link="/tui">@askdb/tui</a>
          <a href="#/rag" data-nav-link="/rag">@askdb/rag</a>
          <a href="#/http-api" data-nav-link="/http-api">@askdb/http-api</a>
        </div>
        <div class="sidebar-section">
          <p>Contracts</p>
          <a href="#/schema-v2" data-nav-link="/schema-v2">Schema v2</a>
          <a href="#/connectors" data-nav-link="/connectors">Connectors</a>
          <a href="#/modes" data-nav-link="/modes">Modes and safety</a>
          <a href="#/environment" data-nav-link="/environment">Environment</a>
        </div>
      </aside>

      <main class="content" id="content" tabindex="-1"></main>

      <aside class="toc" aria-label="On this page">
        <p>On this page</p>
        <div data-toc></div>
      </aside>
    </div>

    <div class="search-panel" data-search-panel hidden></div>

    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
