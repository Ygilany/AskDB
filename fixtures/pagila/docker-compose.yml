# Pagila Postgres dev fixture ([devrimgunduz/pagila](https://github.com/devrimgunduz/pagila)) — not an AskDB app image.
#
# From repo root:
#   docker compose -f fixtures/pagila/docker-compose.yml up --build -d
#
# DATABASE_URL for `askdb ask --execute`:
#   postgres://postgres:postgres@127.0.0.1:5433/pagila
#
# Reset volume (re-run Pagila init):
#   docker compose -f fixtures/pagila/docker-compose.yml down -v
#
# PG 18+: data volume must be /var/lib/postgresql (docker-library/postgres#1259).

services:
  pagila-db:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PAGILA_GIT_REF: master
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pagila
    volumes:
      - pagila_pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pagila"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 120s

volumes:
  pagila_pg_data:
