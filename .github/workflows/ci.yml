name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel stale PR runs; never cancel in-progress main pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # ── 1. Build ──────────────────────────────────────────────────────────────
  # Compiles all packages and seeds the Turbo cache for downstream jobs.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Build all packages
        run: pnpm build

  # ── 2. Test ───────────────────────────────────────────────────────────────
  # Runs unit + integration tests. Turbo replays build outputs from cache so
  # packages are not rebuilt. DB services start in parallel with job setup.
  test:
    needs: build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: askdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: mysql
          MYSQL_DATABASE: askdb_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -pmysql"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
          --health-start-period 30s

      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: "AskDB.123"
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'AskDB.123' -Q 'SELECT 1' -b -C"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 18
          --health-start-period 90s

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/askdb_test
      PAGILA_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5433/pagila
      MYSQL_DATABASE_URL: mysql://root:mysql@127.0.0.1:3306/askdb_test
      MSSQL_DATABASE_URL: "Server=127.0.0.1,1433;Database=askdb_test;User Id=sa;Password=AskDB.123;Encrypt=false"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache/restore@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Create SQL Server test database
        run: >-
          docker exec
          $(docker ps -q --filter "ancestor=mcr.microsoft.com/mssql/server:2022-latest")
          /opt/mssql-tools18/bin/sqlcmd
          -S localhost -U sa -P 'AskDB.123'
          -Q "IF DB_ID('askdb_test') IS NULL CREATE DATABASE askdb_test"
          -C

      - name: Start Pagila introspection fixture
        run: docker compose -f fixtures/pagila/docker-compose.yml up --build --wait -d

      - name: Run unit + integration tests
        run: pnpm test

  # ── 3. Preflight ──────────────────────────────────────────────────────────
  # Release smoke test + publish dry-run. Runs in parallel with `test` so
  # packaging failures surface without waiting for the full DB test suite.
  # smoke:install rebuilds packages internally; turbo cache is restored as a
  # safety net for any direct `pnpm build` calls.
  preflight:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache/restore@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Installable smoke test
        run: pnpm smoke:install

      - name: Validate publish (dry-run)
        run: pnpm -r publish --dry-run --no-git-checks --access=public
