labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for AskDB? Propose it here so it can be discussed before it becomes tracked work. AskDB is pre-1.0, so API-shaping ideas are especially welcome.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What's painful or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed idea
      description: What would you like AskDB to do? Sketch the surface (library / CLI / HTTP) if you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: surface
    attributes:
      label: Which surface does this touch?
      multiple: true
      options:
        - Library (@askdb/core)
        - CLI
        - HTTP
        - Introspection / schema artifact
        - Dialect package
        - Docs
        - Other
