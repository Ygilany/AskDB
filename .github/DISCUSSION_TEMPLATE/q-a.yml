title: "[Q&A] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for asking! Use this for installation, configuration, "how do I…" questions, and help with schema artifacts or the SQL AskDB generates/validates.

        Before posting, please skim the [README](https://github.com/Ygilany/AskDB#readme), the package READMEs, and [`docs/`](https://github.com/Ygilany/AskDB/tree/main/docs).

        **Found a reproducible bug** (including incorrect/unsafe SQL)? Open an [issue](https://github.com/Ygilany/AskDB/issues/new/choose) instead. **Security problem?** Follow [`SECURITY.md`](https://github.com/Ygilany/AskDB/blob/main/SECURITY.md) — do not post it here.
  - type: textarea
    id: question
    attributes:
      label: What are you trying to do?
      description: Describe the goal and what's blocking you.
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What have you tried?
      description: Commands run, code, and any output or error messages.
      render: shell
  - type: textarea
    id: schema
    attributes:
      label: Minimal schema fixture (if relevant)
      description: For schema/SQL questions, a trimmed schema artifact or snippet that shows the behavior. Strip real table/column names if sensitive.
      render: json
  - type: textarea
    id: question-sql
    attributes:
      label: Natural-language question + generated SQL (if relevant)
      render: sql
  - type: input
    id: askdb-version
    attributes:
      label: AskDB package versions
      placeholder: "@askdb/core x.y.z, @askdb/postgres x.y.z"
  - type: input
    id: runtime
    attributes:
      label: Node / pnpm / OS
      placeholder: "Node 20.x, pnpm 11.x, macOS 14"
  - type: input
    id: model
    attributes:
      label: AI provider / model (if relevant)
      placeholder: "openai gpt-..., anthropic claude-..."
  - type: checkboxes
    id: hygiene
    attributes:
      label: Before posting
      options:
        - label: I removed secrets, API keys, customer data, and production database details.
          required: true
        - label: I searched existing discussions and issues.
          required: true
