title: "[Q&A] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for asking! Use this for installation, configuration, and "how do I…" questions about the AskDB library, CLI, or HTTP surfaces.

        Before posting, please skim the [README](https://github.com/ygilany/askdb#readme), the package READMEs, and [`docs/`](https://github.com/ygilany/askdb/tree/main/docs).

        **Found a reproducible bug?** Open an [issue](https://github.com/ygilany/askdb/issues/new/choose) instead. **Security problem?** Follow [`SECURITY.md`](https://github.com/ygilany/askdb/blob/main/SECURITY.md) — do not post it here.
  - type: textarea
    id: question
    attributes:
      label: What are you trying to do?
      description: Describe the goal and what's blocking you.
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What have you tried?
      description: Commands run, code, and any output or error messages.
      render: shell
  - type: input
    id: askdb-version
    attributes:
      label: AskDB package versions
      placeholder: "@askdb/core x.y.z, @askdb/postgres x.y.z"
  - type: input
    id: runtime
    attributes:
      label: Node / pnpm / OS
      placeholder: "Node 20.x, pnpm 11.x, macOS 14"
  - type: checkboxes
    id: hygiene
    attributes:
      label: Before posting
      options:
        - label: I removed secrets, API keys, customer data, and production database details.
          required: true
        - label: I searched existing discussions and issues.
          required: true
