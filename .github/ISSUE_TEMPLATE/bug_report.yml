name: 🐛 Bug report
description: Report a reproducible bug in an AskDB package, CLI, or HTTP surface.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        For questions or "how do I…", use [Discussions](https://github.com/Ygilany/AskDB/discussions) instead. For security issues, follow [`SECURITY.md`](https://github.com/Ygilany/AskDB/blob/main/SECURITY.md).
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal commands/code. Include a minimal schema fixture if relevant.
      render: shell
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Command output / error
      render: shell
  - type: input
    id: askdb-version
    attributes:
      label: AskDB package versions
      placeholder: "@askdb/core x.y.z, @askdb/postgres x.y.z"
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Node / pnpm / OS
      placeholder: "Node 20.x, pnpm 11.x, Ubuntu 22.04"
    validations:
      required: true
  - type: checkboxes
    id: hygiene
    attributes:
      label: Before submitting
      options:
        - label: I removed secrets, API keys, customer data, and production database details.
          required: true
        - label: I searched existing issues and discussions for duplicates.
          required: true
